  </div>
  <div id="tooltip"></div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script>
    const dades = [
      {museu:"MNAC",                rm:33.3, eu:47.5, es:7.0,  cat:8.9,  bcn:2.5,  nc:0.8},
      {museu:"Museu Marítim",       rm:29.4, eu:51.1, es:6.0,  cat:5.2,  bcn:7.2,  nc:1.1},
      {museu:"Museu Picasso",       rm:39.9, eu:43.3, es:2.2,  cat:3.3,  bcn:7.7,  nc:3.6},
      {museu:"Fundació Miró",       rm:26.8, eu:52.2, es:2.5,  cat:6.6,  bcn:11.1, nc:0.6},
      {museu:"Castell de Montjuïc", rm:35.6, eu:42.1, es:3.0,  cat:3.1,  bcn:12.9, nc:3.2},
      {museu:"MUHBA - Pl. del Rei", rm:43.3, eu:33.6, es:3.5,  cat:5.3,  bcn:13.2, nc:1.1},
      {museu:"MACBA",               rm:21.1, eu:50.2, es:6.8,  cat:11.3, bcn:9.1,  nc:1.4},
      {museu:"MCNB - Jardí Botànic",rm:16.7, eu:39.9, es:2.8,  cat:5.6,  bcn:29.0, nc:6.0},
      {museu:"Museu Marès",         rm:22.7, eu:25.3, es:5.9,  cat:14.8, bcn:29.6, nc:1.7},
      {museu:"Museu Tàpies",        rm:19.3, eu:27.7, es:3.2,  cat:41.3, bcn:3.7,  nc:4.8},
      {museu:"La Virreina",         rm:13.8, eu:25.0, es:6.1,  cat:10.9, bcn:39.1, nc:5.1},
      {museu:"Museu de la Música",  rm:11.2, eu:22.7, es:4.1,  cat:23.5, bcn:37.4, nc:1.0},
      {museu:"MCNB - C. Martorell", rm:10.9, eu:23.3, es:2.9,  cat:8.6,  bcn:37.3, nc:17.1},
      {museu:"MUHBA - Born",        rm:14.6, eu:14.8, es:4.5,  cat:20.2, bcn:45.5, nc:0.5},
      {museu:"M. Disseny - DHub",   rm:9.8,  eu:19.8, es:3.6,  cat:18.0, bcn:47.5, nc:1.2},
      {museu:"MUEC - Montjuïc",     rm:10.6, eu:18.5, es:2.9,  cat:21.0, bcn:43.9, nc:3.2},
      {museu:"MCNB - Parc Fòrum",   rm:6.2,  eu:18.8, es:2.1,  cat:21.9, bcn:40.7, nc:10.2},
      {museu:"CCCB",                rm:5.9,  eu:11.2, es:7.3,  cat:32.8, bcn:41.9, nc:1.0},
      {museu:"MUEC – Montcada",rm:7.6,  eu:14.5, es:0.9,  cat:4.5,  bcn:65.6, nc:7.0},
      {museu:"Monestir Pedralbes",  rm:3.4,  eu:8.0,  es:2.5,  cat:30.8, bcn:51.3, nc:4.1},
      {museu:"CAC Fabra i Coats",   rm:3.0,  eu:4.2,  es:0.8,  cat:8.6,  bcn:81.9, nc:1.4},
    ];

    const categories = [
      {key:'rm',  label:'Resta del món', color:'#7B1A1A', textColor:'#fff',    tooltipPrep:'de la resta del món'},
      {key:'eu',  label:'Europa',        color:'#C0504D', textColor:'#fff',    tooltipPrep:"d'Europa"},
      {key:'es',  label:'Espanya',       color:'#E8A09E', textColor:'#232323', tooltipPrep:"d'Espanya"},
      {key:'cat', label:'Catalunya',     color:'#A8D5A2', textColor:'#232323', tooltipPrep:'de Catalunya'},
      {key:'bcn', label:'Barcelona',     color:'#2D7A2D', textColor:'#fff',    tooltipPrep:'de Barcelona'},
      {key:'nc',  label:'No consta',     color:'#CCCCCC', textColor:'#232323', tooltipPrep:null},
    ];

    function getMuseuDe(museu) {
      if (museu === 'Fundació Miró') return 'de la';
      if (museu === 'La Virreina')   return 'de';
      return 'del';
    }

    function formatPct(val) {
      if (val === 0) return '0%';
      const r = Math.round(val * 10) / 10;
      if (r % 1 === 0) return r + '%';
      return r.toFixed(1).replace('.', ',') + '%';
    }

    const svg = d3.select('#mapa');
    const tip = document.getElementById('tooltip');
    const ML = 180, MR = 20, MT = 26, MB = 32;
    const MIN_BAR_PX = 28;

    function draw() {
      svg.selectAll('*').remove();
      const wrapper = document.getElementById('mapa-wrapper');
      const TW = wrapper.clientWidth;
      const TH = wrapper.clientHeight;
      if (TW < 1 || TH < 1) return;

      svg.attr('width', TW).attr('height', TH);

      const W = TW - ML - MR;
      const H = TH - MT - MB;
      const isMobile = TW < 768;
      const yFontSize = isMobile ? '14px' : '16px';
      const xFontSize = isMobile ? '13px' : '14px';

      const g = svg.append('g').attr('transform', `translate(${ML},${MT})`);

      const x = d3.scaleLinear().domain([0, 100]).range([0, W]);
      const y = d3.scaleBand()
        .domain(dades.map(d => d.museu))
        .range([0, H])
        .padding(0.28);

      // Grid + eix X
      g.append('g')
        .attr('transform', `translate(0,${H})`)
        .call(d3.axisBottom(x).ticks(5).tickFormat(d => d + '%').tickSize(-H))
        .call(ax => {
          ax.select('.domain').remove();
          ax.selectAll('.tick line')
            .style('stroke', '#e0e0e0')
            .style('stroke-dasharray', '2,2');
          ax.selectAll('text')
            .style('font-family', "'Times New Roman', Times, serif")
            .style('font-size', xFontSize)
            .style('fill', '#4f4f4f');
        });

      // Eix Y
      g.append('g')
        .call(d3.axisLeft(y).tickSize(0).tickPadding(10))
        .call(ax => ax.select('.domain').remove())
        .selectAll('text')
          .style('font-family', "'Times New Roman', Times, serif")
          .style('font-size', yFontSize)
          .style('line-height', '1.3')
          .style('fill', '#232323')
          .style('text-anchor', 'end');

      // Barres apilades
      const stacked = d3.stack().keys(categories.map(c => c.key))(dades);

      stacked.forEach(layer => {
        const key = layer.key;
        const cat = categories.find(c => c.key === key);

        g.selectAll(`rect.bar-${key}`)
          .data(layer)
          .join('rect')
            .attr('class', `bar-${key}`)
            .attr('y', d => y(d.data.museu))
            .attr('x', d => x(d[0]))
            .attr('width', d => Math.max(0, x(d[1]) - x(d[0])))
            .attr('height', y.bandwidth())
            .attr('fill', cat.color)
            .on('mouseover', function(ev, d) {
              if (window.innerWidth >= 768) { showTip(d, key); moveTooltip(ev); }
            })
            .on('mousemove', function(ev) {
              if (window.innerWidth >= 768) moveTooltip(ev);
            })
            .on('mouseout', function() {
              if (window.innerWidth >= 768) tip.style.display = 'none';
            })
            .on('click', function(ev, d) {
              showTip(d, key); moveTooltip(ev); ev.stopPropagation();
            });

        g.selectAll(`text.lbl-${key}`)
          .data(layer)
          .join('text')
            .attr('class', `lbl-${key}`)
            .attr('y', d => y(d.data.museu) + y.bandwidth() / 2)
            .attr('x', d => x(d[0]) + (x(d[1]) - x(d[0])) / 2)
            .attr('dy', '0.35em')
            .attr('text-anchor', 'middle')
            .style('font-family', "'Times New Roman', Times, serif")
            .style('font-size', '11px')
            .style('fill', cat.textColor)
            .style('pointer-events', 'none')
            .text(d => {
              const bw = x(d[1]) - x(d[0]);
              return bw >= MIN_BAR_PX ? formatPct(d[1] - d[0]) : '';
            });
      });

      // Línia 50%
      g.append('line')
        .attr('x1', x(50)).attr('x2', x(50))
        .attr('y1', 0).attr('y2', H)
        .attr('stroke', '#000')
        .attr('stroke-width', 1.5)
        .attr('stroke-dasharray', '6,4');

      g.append('text')
        .attr('x', x(50) + 4)
        .attr('y', -8)
        .style('font-size', xFontSize)
        .style('font-family', "'Times New Roman', Times, serif")
        .style('fill', '#232323')
        .text('50%');
    }

    function showTip(d, key) {
      const pct  = formatPct(d[1] - d[0]);
      const museu = d.data.museu;
      const de   = getMuseuDe(museu);
      const prep = categories.find(c => c.key === key).tooltipPrep;
      let html;
      if (key === 'nc') {
        html = `No consta d'on provenen el <strong>${pct}</strong> de visitants ${de} <strong>${museu}</strong>.`;
      } else {
        html = `El <strong>${pct}</strong> de visitants ${de} <strong>${museu}</strong> provenen <strong>${prep}</strong>.`;
      }
      tip.innerHTML = html;
      tip.style.display = 'block';
    }

    function moveTooltip(ev) {
      const M = 8;
      const W2 = window.innerWidth, H2 = window.innerHeight;
      tip.style.left = '0px'; tip.style.top = '0px';
      const tw = tip.offsetWidth, th = tip.offsetHeight;
      let lx = ev.clientX + 14, ly = ev.clientY + 14;
      if (lx + tw + M > W2) lx = ev.clientX - tw - 14;
      if (lx < M) lx = M;
      if (ly + th + M > H2) ly = ev.clientY - th - 14;
      if (ly < M) ly = M;
      tip.style.left = lx + 'px';
      tip.style.top  = ly + 'px';
    }

    document.addEventListener('click', () => { tip.style.display = 'none'; });

    let rafId;
    if (window.ResizeObserver) {
      new ResizeObserver(() => {
        cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(draw);
      }).observe(document.getElementById('mapa-wrapper'));
    } else {
      window.addEventListener('resize', () => {
        cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(draw);
      });
      draw();
    }
  </script>
